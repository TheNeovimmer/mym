<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up / Log In — MYM</title>
  <link rel="icon" href="assets/images/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <img src="assets/images/logo.png" alt="MYM">
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="library.html">Library</a>
      <a href="mym.html">Mym AI</a>
    </div>
    <div class="nav-profile">
      <a href="auth.html"><div class="nav-avatar">K</div></a>
    </div>
    <div class="menu-toggle"><span></span><span></span><span></span></div>
  </nav>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <img src="assets/images/logo.png" alt="MYM">
        <h2>Welcome to <span style="color:var(--blue);">MYM</span></h2>
        <p>Sign language learning through play</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <div class="auth-forms">
        <form class="auth-form active" id="loginForm">
          <div class="field">
            <label>Email or Username</label>
            <div class="input-icon">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="input-icon">
              <i class="fa-regular fa-lock"></i>
              <input type="password" placeholder="Your password" required>
              <i class="fa-regular fa-eye toggle-pw"></i>
            </div>
          </div>
          <div class="field-row">
            <label class="checkbox-label"><input type="checkbox" checked> Remember me</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button class="btn btn-primary btn-lg btn-full" type="submit">Log In</button>
        </form>

        <form class="auth-form" id="signupForm">
          <div class="field">
            <label>Display Name</label>
            <div class="input-icon">
              <i class="fa-regular fa-user"></i>
              <input type="text" placeholder="Your name" required>
            </div>
          </div>
          <div class="field">
            <label>Email</label>
            <div class="input-icon">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="input-icon">
              <i class="fa-regular fa-lock"></i>
              <input type="password" placeholder="Min 8 characters" required>
              <i class="fa-regular fa-eye toggle-pw"></i>
            </div>
            <div class="pw-strength"><span></span><span></span><span></span></div>
          </div>
          <button class="btn btn-primary btn-lg btn-full" type="submit">Create Account</button>
        </form>
      </div>

      <div class="auth-divider"><span>or continue with</span></div>

      <div class="auth-social">
        <button class="btn btn-outline social-btn">
          <i class="fa-brands fa-google"></i> Google
        </button>
        <button class="btn btn-outline social-btn">
          <i class="fa-brands fa-facebook-f"></i> Facebook
        </button>
        <button class="btn btn-outline social-btn">
          <i class="fa-brands fa-apple"></i> Apple
        </button>
      </div>

      <div class="auth-trust">
        <span><i class="fa-solid fa-lock" style="font-size:12px;"></i> Encrypted</span>
        <span><i class="fa-solid fa-shield" style="font-size:12px;"></i> Secure</span>
        <span><i class="fa-solid fa-check" style="font-size:12px;"></i> No spam</span>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
