<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mym AI — MYM</title>
  <link rel="icon" href="assets/images/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <img src="assets/images/logo.png" alt="MYM">
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="library.html">Library</a>
      <a href="mym.html" class="active">Mym AI</a>
    </div>
    <div class="nav-profile">
      <div class="nav-xp"><i class="fa-solid fa-bolt"></i><span class="xp-animate">420</span></div>
      <div class="streak-badge"><i class="fa-solid fa-fire"></i> <span>7</span></div>
      <a href="profile.html"><div class="nav-avatar">K</div></a>
    </div>
    <div class="menu-toggle"><span></span><span></span><span></span></div>
  </nav>

  <main class="mym-page">
    <div class="container">
      <div class="card mym-chat-card">
        <div class="mym-header">
          <div class="mym-avatar">M</div>
          <div>
            <h3>Mym</h3>
            <span class="mym-status online">Online</span>
          </div>
        </div>

        <div class="mym-messages">
          <div class="mym-msg bot">
            <div class="msg-bubble">Hi! I'm Mym, your sign language tutor. Ready to practice?</div>
          </div>
          <div class="mym-msg user">
            <div class="msg-bubble user-bubble">Yes! What should we work on?</div>
          </div>
          <div class="mym-msg bot">
            <div class="msg-bubble">Let's start with greetings. I'll show you a sign — you tell me what it means!</div>
          </div>
        </div>

        <div class="mym-quick-actions">
          <button class="quick-action">Practice Greetings</button>
          <button class="quick-action">Review Numbers</button>
          <button class="quick-action">Fingerspelling</button>
          <button class="quick-action">Show Progress</button>
        </div>

        <div class="mym-input">
          <input type="text" placeholder="Type a message or ask Mym something...">
          <button class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
